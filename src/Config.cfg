# =============================================================================
# config.cfg — CynLr configuration
#
# This file is read by ConfigManager::load() on startup.
# Lines beginning with # are comments and are ignored.
# All keys are case-sensitive.
# =============================================================================

# -----------------------------------------------------------------------------
# m : Number of columns in the virtual 2-D pixel array.
# The Data Generation block outputs 2 consecutive pixels per cycle,
# so m must be a positive even integer.
# Required — no default. Must be set here or via --m=<value> on the CLI.
# -----------------------------------------------------------------------------
m = 8

# -----------------------------------------------------------------------------
# T : Cycle time in nanoseconds.
# Each pipeline block must deliver its output within this window.
# Minimum value per spec: 500 ns.
# Required — no default. Must be set here or via --T=<value> on the CLI.
# -----------------------------------------------------------------------------
T = 1000000

# -----------------------------------------------------------------------------
# threshold : Binarisation threshold value (0–255).
# After filtering, a pixel value >= threshold becomes 1 (defect detected),
# a value < threshold becomes 0 (clean).
# Default: 128
# -----------------------------------------------------------------------------
threshold = 128

# -----------------------------------------------------------------------------
# mode : Data source mode.
#   random — generate pixel values with RNG (production / stress-test mode)
#   csv    — read pixel values from input_file (test / evaluation mode)
# Default: random
# -----------------------------------------------------------------------------
mode = random

# -----------------------------------------------------------------------------
# input_file : Path to the CSV input file.
# Only used when mode = csv.
# Each line of the CSV represents one scan line (row) with exactly m values,
# comma-separated, in the range 0–255.
#
# Example CSV format for m=4:
#   10,20,30,40
#   50,60,70,80
#
# Uncomment and set the path below when running in csv mode:
# -----------------------------------------------------------------------------
# input_file = data/sample_scan.csv

# -----------------------------------------------------------------------------
# kernel : 9-element convolution filter window (comma-separated floats).
# Applied to each pixel with its 4 predecessors and 4 successors.
# If omitted, the Gaussian kernel from the problem specification is used.
#
# Default (Gaussian, sum ≈ 1.0):
#   K-4=0.00025177, K-3=0.008666992, K-2=0.078025818, K-1=0.24130249,
#   K=0.343757629,  K+1=0.24130249,  K+2=0.078025818, K+3=0.008666992,
#   K+4=0.000125885
# -----------------------------------------------------------------------------
# kernel = 0.00025177,0.008666992,0.078025818,0.24130249,0.343757629,0.24130249,0.078025818,0.008666992,0.000125885 
# This  is already present in the ConfigManager as default value
