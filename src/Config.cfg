# =============================================================================
# CynLr Pipeline Configuration
# =============================================================================
# Format  : key = value
# Comments: lines starting with '#' are ignored.
# Unknown keys are silently skipped — safe to add future stage config here.
# CLI flags override file values (highest precedence).
# =============================================================================


# -----------------------------------------------------------------------------
# m : Number of columns (pixels per scan line).
# Must be a positive even integer >= 2.
# The pipeline outputs 2 consecutive pixels per cycle.
# -----------------------------------------------------------------------------
m = 10

# -----------------------------------------------------------------------------
# T : Cycle time in nanoseconds.
# Each pipeline block must deliver its output within this budget.
# Minimum per spec: 500 ns.
# -----------------------------------------------------------------------------
T = 1500

# -----------------------------------------------------------------------------
# threshold : Binarisation threshold (0–255).
# Filtered value >= threshold → 1 (defect detected)
# Filtered value <  threshold → 0 (clean)
# -----------------------------------------------------------------------------
threshold = 128


# -----------------------------------------------------------------------------
# mode : Data source.
#   random — RNG pixel values (stress-test / infinite mode)
#   csv    — read from input_file (test / evaluation mode)
# CLI: --mode=csv | --mode=random
# -----------------------------------------------------------------------------
mode = random
# mode = csv


# -----------------------------------------------------------------------------
# input_file : CSV input path.  Required when mode = csv.
# Each line = one scan row with exactly m comma-separated values in [0, 255].
# -----------------------------------------------------------------------------
# input_file = ./data/sample_scan.csv


# -----------------------------------------------------------------------------
# kernel : Convolution filter coefficients (comma-separated floats, odd count).
# Omit to use the default 9-tap asymmetric Gaussian from the spec.
# -----------------------------------------------------------------------------
# kernel = 0.00025177,0.008666992,0.078025818,0.24130249,0.343757629,0.24130249,0.078025818,0.008666992,0.000125885


# =============================================================================
# Termination Control
# =============================================================================
# 0 = unlimited for both.  Whichever limit fires first stops the pipeline.
# SIGINT (Ctrl+C) / SIGTERM always terminates regardless of these values.
# CLI: --duration=<ms>  |  --max-rows=<N>
# =============================================================================

run_duration_ms = 5000
max_rows        = 100000


# =============================================================================
# Filter Edge Behaviour
# =============================================================================
# Controls how the convolution window is filled when it extends beyond the
# start or end of a row (first and last half_width pixels per row).
#
# replicate : extend the nearest real edge pixel (default).
#             Physically meaningful — scanner was seeing that value.
# zero_pad  : fill with 0.  Simple but biases edge outputs downward,
#             which may cause threshold misses at row boundaries.
#
# CLI: --boundary=replicate | --boundary=zero_pad
# =============================================================================
# boundary_policy = replicate
boundary_policy = zero_pad


# =============================================================================
# CSV Column Mismatch Policy
# =============================================================================
# Controls what happens when a CSV row has a different number of values than m.
# Only meaningful when mode = csv.
#
# reject   : throw an error on the first malformed row (default).
#            Use this during evaluation — the file must match m exactly.
# truncate : silently drop extra columns; skip short rows with a warning.
#            m is authoritative; file may be wider.
# zero_pad : pad short rows with 0 to reach m; truncate long rows.
#            Preserves output pixel count even for narrower files.
#
# CLI: --csv-mismatch=reject | --csv-mismatch=truncate | --csv-mismatch=zero_pad
# =============================================================================
csv_mismatch_policy = reject
# csv_mismatch_policy = truncate
# csv_mismatch_policy = zero_pad


# =============================================================================
# Output Stage (CSVWriterBlock — next pipeline stage, not yet wired)
# =============================================================================
# These keys are silently ignored by the current binary.
# They are parsed by CSVWriterBlock when that stage is added.
# =============================================================================

write_output = true
output_file  = output.csv